const W = 1920, H = 1080;

// ── Geometry ──────────────────────────────────────────────────────────────────
const TL_X0 = 100, TL_X1 = 1820;
const ERA_W  = (TL_X1 - TL_X0) / 5;   // 344 px per era
const ERA_BOX_Y = 90, ERA_BOX_H = 96;
const ABOVE_CY = 232, TL_Y = 298, BELOW_CY = 364;
const MR = 13; // marker radius

const eraX0 = ei => TL_X0 + ei * ERA_W;
const eraXc  = ei => eraX0(ei) + ERA_W / 2;
const eventX = (ei, evi, tot) => {
  const x0 = eraX0(ei), pad = ERA_W * 0.15;
  return tot === 1
    ? x0 + ERA_W / 2
    : x0 + pad + (evi / (tot - 1)) * (ERA_W - 2 * pad);
};

const ALL = ERAS.flatMap((era, ei) =>
  era.events.map((ev, evi) => ({ ...ev, eraId: era.id, ei, evi }))
);

function flatIdx(eraId, evi) {
  let n = 0;
  for (const e of ERAS) {
    if (e.id === eraId) return n + evi;
    n += e.events.length;
  }
  return 0;
}

function AIGlyph() {
  const L = [
    [{x:18,y:45},{x:18,y:95}],
    [{x:62,y:24},{x:62,y:58},{x:62,y:92},{x:62,y:126}],
    [{x:106,y:45},{x:106,y:95}],
    [{x:144,y:70}],
  ];
  let ki = 0;
  const conn = [];
  for (let li=0; li<L.length-1; li++)
    for (const a of L[li])
      for (const b of L[li+1])
        conn.push(<line key={ki++} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke={INK} strokeWidth="1" strokeOpacity="0.3"/>);
  return (
    <svg viewBox="0 0 165 150" width="100%" height="100%">
      {conn}
      {L.flat().map((n,i) => (
        <circle key={i} cx={n.x} cy={n.y} r="8" fill={PAPER} stroke={INK} strokeWidth="1.5"/>
      ))}
    </svg>
  );
}

// ── Timeline visualization ────────────────────────────────────────────────────
function Timeline({ eraId, evIdx, onEra, onEvent }) {
  const [hov, setHov] = React.useState(null);

  return (
    <svg width={W} height={482} style={{ position: 'absolute', left: 0, top: 52 }}>

      {/* Top rule */}
      <line x1={60} y1={78} x2={W-60} y2={78} stroke={INK} strokeWidth="0.8" strokeOpacity="0.35"/>

      {/* Era header boxes */}
      {ERAS.map((era, ei) => {
        const cx  = eraXc(ei);
        const x0  = eraX0(ei);
        const sel = era.id === eraId;
        const yrs = `${era.events[0].year}–${era.events[era.events.length-1].year}`;
        return (
          <g key={era.id} style={{ cursor: 'pointer' }} onClick={() => onEra(era.id)}>
            <rect x={x0+2} y={ERA_BOX_Y} width={ERA_W-4} height={ERA_BOX_H}
              fill={sel ? INK : PAPER} stroke={INK} strokeWidth="1.4"/>
            <text x={cx} y={ERA_BOX_Y+22} textAnchor="middle" fontFamily={MONO}
              fontSize="11" fontWeight="700" letterSpacing="0.2em"
              fill={sel ? PAPER : `${INK}77`}>{era.tag}</text>
            <text x={cx} y={ERA_BOX_Y+48} textAnchor="middle" fontFamily={MONO}
              fontSize="13" fontWeight="700" letterSpacing="0.13em"
              fill={sel ? PAPER : INK}>{era.label}</text>
            <text x={cx} y={ERA_BOX_Y+69} textAnchor="middle" fontFamily={MONO}
              fontSize="10" letterSpacing="0.12em"
              fill={sel ? `${PAPER}99` : `${INK}66`}>{yrs}</text>
            {sel && (
              <polygon
                points={`${cx-9},${ERA_BOX_Y+ERA_BOX_H} ${cx+9},${ERA_BOX_Y+ERA_BOX_H} ${cx},${ERA_BOX_Y+ERA_BOX_H+14}`}
                fill={INK}/>
            )}
          </g>
        );
      })}

      {/* Timeline bar */}
      <line x1={TL_X0} y1={TL_Y} x2={TL_X1} y2={TL_Y} stroke={INK} strokeWidth="1.5"/>

      {/* Era dividers */}
      {ERAS.slice(1).map((_,i) => {
        const x = TL_X0 + (i+1) * ERA_W;
        return (
          <line key={i} x1={x} y1={TL_Y-18} x2={x} y2={TL_Y+18}
            stroke={INK} strokeWidth="1" strokeDasharray="3 3" strokeOpacity="0.5"/>
        );
      })}

      {/* Endpoint ticks */}
      <line x1={TL_X0} y1={TL_Y-10} x2={TL_X0} y2={TL_Y+10} stroke={INK} strokeWidth="2"/>
      <line x1={TL_X1} y1={TL_Y-10} x2={TL_X1} y2={TL_Y+10} stroke={INK} strokeWidth="2"/>
      <text x={TL_X0} y={TL_Y+28} textAnchor="middle" fontFamily={MONO} fontSize="10" fill={INK} opacity="0.4">1857</text>
      <text x={TL_X1} y={TL_Y+28} textAnchor="middle" fontFamily={MONO} fontSize="10" fill={INK} opacity="0.4">2024</text>

      {/* Event markers */}
      {ERAS.map((era, ei) => era.events.map((ev, evi) => {
        const x      = eventX(ei, evi, era.events.length);
        const above  = evi % 2 === 0;
        const cy     = above ? ABOVE_CY : BELOW_CY;
        const sel    = era.id === eraId && evi === evIdx;
        const hovered = hov && hov.ei === ei && hov.evi === evi;

        return (
          <g key={`${ei}-${evi}`} style={{ cursor: 'pointer' }}
            onClick={() => onEvent(era.id, evi)}
            onMouseEnter={() => setHov({ei, evi})}
            onMouseLeave={() => setHov(null)}>

            {/* Connector line */}
            <line x1={x} y1={TL_Y} x2={x} y2={above ? cy + MR : cy - MR}
              stroke={INK} strokeWidth={sel ? 1.5 : 0.8}
              strokeDasharray={sel ? '' : '3 4'}
              strokeOpacity={sel ? 1 : 0.4}/>

            {/* Bar tick on timeline */}
            <line x1={x} y1={TL_Y-6} x2={x} y2={TL_Y+6} stroke={INK} strokeWidth="1.2"/>

            {/* Marker */}
            <circle cx={x} cy={cy} r={hovered ? MR+2 : MR}
              fill={sel ? INK : PAPER}
              stroke={INK} strokeWidth={sel ? 2 : 1.4}/>
            <circle cx={x} cy={cy} r={5} fill={sel ? PAPER : INK}/>

            {/* Year label */}
            <text x={x} y={above ? cy-MR-7 : cy+MR+18}
              textAnchor="middle" fontFamily={MONO} fontSize="11"
              fontWeight={sel ? '700' : '400'}
              fill={INK} letterSpacing="0.06em"
              opacity={sel || hovered ? 1 : 0.55}>
              {ev.year}
            </text>
          </g>
        );
      }))}

      {/* Bottom rule */}
      <line x1={60} y1={432} x2={W-60} y2={432} stroke={INK} strokeWidth="0.8" strokeOpacity="0.4"/>
    </svg>
  );
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function Detail({ eraId, evIdx, trans, nav }) {
  const era = ERAS.find(e => e.id === eraId);
  const ev  = era && era.events[evIdx];
  if (!ev) return null;

  const flat  = flatIdx(eraId, evIdx);
  const total = ALL.length;
  const prev  = flat > 0         ? ALL[flat-1] : null;
  const next  = flat < total-1   ? ALL[flat+1] : null;
  const G     = GLYPHS[eraId];

  return (
    <div style={{
      position: 'absolute', left: 80, right: 80, top: 534, bottom: 140,
      border: `1.4px solid ${INK}`,
      display: 'flex',
      opacity: trans ? 0 : 1,
      transition: 'opacity 130ms ease',
    }}>

      {/* ── Left column: meta ── */}
      <div style={{
        width: 560, flexShrink: 0,
        borderRight: `1px solid ${INK}44`,
        padding: '28px 32px',
        display: 'flex', flexDirection: 'column',
        position: 'relative',
      }}>
        <div style={{
          fontFamily: MONO, fontSize: 11, letterSpacing: '0.2em',
          color: INK, opacity: 0.5,
          textTransform: 'uppercase', marginBottom: 14,
        }}>
          {era.tag} &nbsp;·&nbsp; {era.label}
        </div>

        <div style={{
          fontFamily: MONO, fontSize: 84, fontWeight: 700,
          lineHeight: 0.92, color: INK,
          letterSpacing: '-0.02em', marginBottom: 14,
        }}>
          {ev.year}
        </div>

        <div style={{
          fontFamily: MONO, fontSize: 20, fontWeight: 700,
          color: INK, letterSpacing: '0.03em', marginBottom: 10,
        }}>
          {ev.title}
        </div>

        <div style={{
          fontFamily: MONO, fontSize: 12,
          color: INK, opacity: 0.5,
          letterSpacing: '0.18em', textTransform: 'uppercase',
        }}>
          {ev.by}
        </div>

        {/* Era-within dots */}
        <div style={{
          position: 'absolute', bottom: 52, left: 32,
          display: 'flex', gap: 6, alignItems: 'center',
        }}>
          {era.events.map((_, i) => (
            <div key={i} style={{
              width: i === evIdx ? 20 : 8, height: 8,
              background: i === evIdx ? INK : `${INK}30`,
              borderRadius: 4,
              transition: 'width 220ms ease',
              cursor: 'pointer',
            }} onClick={() => nav(eraId, i)}/>
          ))}
        </div>

        <div style={{
          position: 'absolute', bottom: 26, left: 32,
          fontFamily: MONO, fontSize: 11,
          color: INK, opacity: 0.3, letterSpacing: '0.14em',
        }}>
          HITO {flat+1} / {total}
        </div>
      </div>

      {/* ── Right column: content ── */}
      <div style={{
        flex: 1, padding: '28px 36px',
        position: 'relative',
        display: 'flex', flexDirection: 'column',
      }}>

        {/* Glyph */}
        <div style={{
          position: 'absolute', right: 36, top: 24,
          width: 166, height: 148, opacity: 0.65,
        }}>
          <G/>
        </div>

        {/* Description */}
        <div style={{
          fontFamily: SANS, fontSize: 20, lineHeight: 1.65,
          color: INK, opacity: 0.82,
          maxWidth: 840, marginTop: 8,
        }}>
          {ev.body}
        </div>

        {/* Navigation bar */}
        <div style={{
          marginTop: 'auto',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          paddingTop: 18,
          borderTop: `1px solid ${INK}25`,
        }}>
          {prev ? (
            <button onClick={() => nav(prev.eraId, prev.evi)} style={{
              background: 'none',
              border: `1px solid ${INK}40`,
              borderRadius: 2,
              fontFamily: MONO, fontSize: 11,
              color: INK, opacity: 0.6,
              letterSpacing: '0.1em', textTransform: 'uppercase',
              cursor: 'pointer', padding: '7px 14px',
              transition: 'opacity 120ms',
            }}>
              ← {prev.year} · {prev.title}
            </button>
          ) : <div/>}

          <div style={{
            fontFamily: MONO, fontSize: 11,
            color: INK, opacity: 0.25,
            letterSpacing: '0.2em',
          }}>
            ← → PARA NAVEGAR
          </div>

          {next ? (
            <button onClick={() => nav(next.eraId, next.evi)} style={{
              background: 'none',
              border: `1px solid ${INK}40`,
              borderRadius: 2,
              fontFamily: MONO, fontSize: 11,
              color: INK, opacity: 0.6,
              letterSpacing: '0.1em', textTransform: 'uppercase',
              cursor: 'pointer', padding: '7px 14px',
              transition: 'opacity 120ms',
            }}>
              {next.year} · {next.title} →
            </button>
          ) : <div/>}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [eraId, setEraId] = React.useState(() => {
    try {
      const s = localStorage.getItem('hta:era');
      return ERAS.find(e => e.id === s) ? s : 'acoustic';
    } catch { return 'acoustic'; }
  });

  const [evIdx, setEvIdx] = React.useState(() => {
    try {
      const s  = localStorage.getItem('hta:era');
      const era = ERAS.find(e => e.id === s);
      const i  = parseInt(localStorage.getItem('hta:ev') || '0', 10);
      return (era && i >= 0 && i < era.events.length) ? i : 0;
    } catch { return 0; }
  });

  const [trans, setTrans]   = React.useState(false);
  const [scale, setScale]   = React.useState(1);
  const stageRef            = React.useRef(null);
  const timerRef            = React.useRef(null);

  // Persist selection
  React.useEffect(() => {
    try {
      localStorage.setItem('hta:era', eraId);
      localStorage.setItem('hta:ev',  String(evIdx));
    } catch {}
  }, [eraId, evIdx]);

  // Scale canvas to viewport
  React.useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const measure = () => setScale(Math.min(el.clientWidth / W, el.clientHeight / H));
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, []);

  // Navigate with fade transition
  const nav = React.useCallback((newEra, newEv) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setTrans(true);
    timerRef.current = setTimeout(() => {
      setEraId(newEra);
      setEvIdx(newEv);
      setTrans(false);
    }, 130);
  }, []);

  // Keyboard ← →
  React.useEffect(() => {
    const handle = e => {
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      e.preventDefault();
      const ei  = ERAS.findIndex(er => er.id === eraId);
      const era = ERAS[ei];
      if (e.key === 'ArrowRight') {
        if (evIdx < era.events.length - 1) nav(eraId, evIdx + 1);
        else if (ei < ERAS.length - 1)     nav(ERAS[ei+1].id, 0);
      } else {
        if (evIdx > 0) nav(eraId, evIdx - 1);
        else if (ei > 0) { const p = ERAS[ei-1]; nav(p.id, p.events.length - 1); }
      }
    };
    window.addEventListener('keydown', handle);
    return () => window.removeEventListener('keydown', handle);
  }, [eraId, evIdx, nav]);

  return (
    <div ref={stageRef} style={{
      position: 'fixed', inset: 0,
      background: '#0a0a0a',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{
        width: W, height: H,
        background: PAPER,
        position: 'relative',
        transform: `scale(${scale})`,
        transformOrigin: 'center',
        flexShrink: 0,
        boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
        overflow: 'hidden',
        animation: 'htaIn 400ms ease-out forwards',
      }}>
        <Bg/>
        <Frame/>

        {/* Main title */}
        <div style={{
          position: 'absolute', left: 100, top: 56,
          fontFamily: MONO, fontSize: 14, fontWeight: 700,
          color: INK, letterSpacing: '0.22em', textTransform: 'uppercase',
        }}>
          HISTORIA DE LA TECNOLOGÍA DE AUDIO
        </div>

        {/* Section tag */}
        <div style={{
          position: 'absolute', right: 100, top: 56,
          fontFamily: MONO, fontSize: 11,
          color: INK, opacity: 0.45,
          letterSpacing: '0.2em', textTransform: 'uppercase',
        }}>
          CINCO ERAS · 29 HITOS · 1857–2024
        </div>

        <Timeline
          eraId={eraId} evIdx={evIdx}
          onEra={id => nav(id, 0)}
          onEvent={nav}/>

        <Detail eraId={eraId} evIdx={evIdx} trans={trans} nav={nav}/>

        {/* Bottom-right title block */}
        <div style={{
          position: 'absolute', right: 60, bottom: 50,
          fontFamily: MONO, fontSize: 11,
          color: INK,
          textTransform: 'uppercase', letterSpacing: '0.12em',
          textAlign: 'right', lineHeight: 1.7,
        }}>
          <div style={{ borderBottom: `1px solid ${INK}`, paddingBottom: 5, marginBottom: 5 }}>
            AUDIO TECHNOLOGY TIMELINE
          </div>
          <div style={{ opacity: 0.5 }}>29 HITOS · 5 ERAS · 1857–2024</div>
          <div style={{ opacity: 0.5 }}>TIMELINE INTERACTIVO · REV. A</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
